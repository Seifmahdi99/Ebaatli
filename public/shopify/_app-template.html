<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ebaatli</title>

  <!--
    App Bridge MUST be the first <script> tag, loaded synchronously (no async/defer)
    from Shopify's CDN. The API key placeholder is replaced at request time by
    the /shopify/embedded-app controller endpoint.
  -->
  <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js" data-api-key="__SHOPIFY_API_KEY__"></script>

  <link rel="stylesheet" href="Styles/main.css" />
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar" id="topbar" style="display:none">
    <div class="topbar-logo">⚡</div>
    <div>
      <div class="topbar-name">Ebaatli</div>
      <div class="topbar-store" id="storeName">Loading…</div>
    </div>
    <div class="topbar-right">
      <a id="portalBtn" class="btn btn-ghost btn-sm" href="#" target="_blank">
        Open Full Portal ↗
      </a>
    </div>
  </header>

  <!-- Tab Strip -->
  <nav class="tabs" id="tabs" style="display:none">
    <button class="tab active" data-tab="overview">
      <span class="tab-icon">📊</span> Overview
    </button>
    <button class="tab" data-tab="flows">
      <span class="tab-icon">⚡</span> Flows
    </button>
    <button class="tab" data-tab="whatsapp">
      <span class="tab-icon">💬</span> WhatsApp
    </button>
    <button class="tab" data-tab="billing">
      <span class="tab-icon">💳</span> Billing
    </button>
  </nav>

  <!-- Page Content -->
  <main class="page" id="pageContent">
    <div class="loading">
      <div class="spinner"></div>
      Connecting to your store…
    </div>
  </main>

  <!-- Facebook SDK (async) — required for WhatsApp Embedded Signup -->
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId  : '2083972588839965',
        cookie : true,
        xfbml  : true,
        version: 'v22.0'
      });
      FB.AppEvents.logPageView();
    };

    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) { return; }
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/en_US/sdk.js';
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));
  </script>

  <!-- Page scripts (loaded before app.js so functions exist) -->
  <script src="Js/pages/overview.js"></script>
  <script src="Js/pages/flows.js"></script>
  <script src="Js/pages/whatsapp.js"></script>
  <script src="Js/pages/billing.js"></script>

  <!-- Bootstrap (runs last) -->
  <script src="Js/app.js"></script>

</body>
</html>
