<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ebaatli Merchant Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">⚡</div>
            <div>
                <div class="sidebar-title">Ebaatli</div>
                <div class="sidebar-subtitle">Merchant Panel</div>
            </div>
        </div>

        <nav class="nav-section">
            <div class="nav-label">Dashboard</div>

            <a class="nav-item active" id="nav-overview" data-page="overview">
                <span class="nav-icon">📊</span> Overview
            </a>

            <a class="nav-item" id="nav-usage" data-page="usage">
                <span class="nav-icon">📈</span> Usage
            </a>

            <a class="nav-item" id="nav-whatsapp" data-page="whatsapp">
                <span class="nav-icon">💬</span> WhatsApp
            </a>

            <a class="nav-item" id="nav-flows" data-page="flows">
                <span class="nav-icon">⚡</span> Flows
            </a>

            <a class="nav-item" id="nav-messages" data-page="messages">
                <span class="nav-icon">✉️</span> Messages
            </a>

            <a class="nav-item" id="nav-settings" data-page="settings">
                <span class="nav-icon">⚙️</span> Settings
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="nav-item" id="logoutBtn">
                <span class="nav-icon">🚪</span> Exit Store
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main">
        <header class="topbar">
            <h2 id="pageTitle">Overview</h2>
            <div class="flex items-center gap-3">
                <span style="font-size:0.8rem;color:var(--text-muted)" id="lastUpdated"></span>
                <button class="btn btn-ghost btn-sm" id="refreshBtn">↺ Refresh</button>
            </div>
        </header>

        <div class="page-content" id="pageContent">
            <div class="loading">Loading…</div>
        </div>
    </main>

    <!-- Merchant scripts -->
    <script src="js/merchant-auth.js"></script>
    <script src="js/merchant-api.js"></script>

    <!-- Pages (load first) -->
    <script src="js/pages/overview.js"></script>
    <script src="js/pages/usage.js"></script>
    <script src="js/pages/whatsapp.js"></script>
    <script src="js/pages/flows.js"></script>
    <script src="js/pages/messages.js"></script>
    <script src="js/pages/settings.js"></script>

    <!-- Router LAST -->
    <script src="js/router.js"></script>

  <!-- Facebook SDK (async) — required for WhatsApp Embedded Signup -->
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId  : '2083972588839965',
        cookie : true,
        xfbml  : true,
        version: 'v22.0'
      });
      FB.AppEvents.logPageView();
    };

    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) { return; }
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/en_US/sdk.js';
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));
  </script>

</body>

</html>
